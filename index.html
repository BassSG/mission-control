<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>🎯 Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; --secondary: #8b5cf6;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --dark: #0f172a; --dark2: #1e293b; --dark3: #334155;
            --text: #f8fafc; --text2: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Prompt', sans-serif; background: var(--dark); color: var(--text); padding-bottom: 70px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 16px; text-align: center; }
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; }
        .nav-card { background: var(--dark2); padding: 12px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .nav-card.active { border: 1px solid var(--primary); background: var(--dark3); }
        
        .content { padding: 16px; }
        .page { display: none; }
        .page.active { display: block; }
        
        .card { background: var(--dark2); border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
        .section-title { font-weight: 600; margin-bottom: 10px; }
        
        .input-box { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        input, select, textarea { background: var(--dark3); border: none; padding: 10px; color: white; border-radius: 8px; }
        button { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; }
        button:hover { background: var(--secondary); }
        
        .item-row { display: flex; justify-content: space-between; background: var(--dark3); padding: 12px; border-radius: 8px; margin-bottom: 8px; }
        .delete-btn { color: var(--danger); cursor: pointer; }
        
        .loading { opacity: 0.5; pointer-events: none; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header"><h1>🎯 Mission Control</h1></div>
    
    <div class="nav-grid">
        <div class="nav-card active" onclick="goPage('home')">🏠<br>หลัก</div>
        <div class="nav-card" onclick="goPage('tasks')">📋<br>งาน</div>
        <div class="nav-card" onclick="goPage('notes')">📝<br>โน้ต</div>
        <div class="nav-card" onclick="goPage('system')">💻<br>ระบบ</div>
    </div>
    
    <div class="content">
        <!-- HOME -->
        <div class="page active fade-in" id="page-home">
            <div class="section-title">🌤️ สภาพอากาศ (Weather)</div>
            <div class="card" id="weather-card">กำลังโหลด...</div>
            
            <div class="section-title">📰 ข่าวล่าสุด (News)</div>
            <div class="card" id="news-card">กำลังโหลด...</div>
        </div>
        
        <!-- TASKS -->
        <div class="page fade-in" id="page-tasks">
            <div class="input-box">
                <input type="text" id="task-title" placeholder="ชื่องาน...">
                <button onclick="addTask()">+ เพิ่มงาน</button>
            </div>
            <div id="task-list"></div>
        </div>
        
        <!-- NOTES -->
        <div class="page fade-in" id="page-notes">
            <div class="input-box">
                <input type="text" id="note-title" placeholder="หัวข้อ...">
                <textarea id="note-body" placeholder="เนื้อหา..."></textarea>
                <button onclick="addNote()">+ เพิ่มโน้ต</button>
            </div>
            <div id="note-list"></div>
        </div>
        
        <!-- SYSTEM -->
        <div class="page fade-in" id="page-system">
            <div class="section-title">💻 สถานะระบบ</div>
            <div class="card" id="sys-status">กำลังโหลดข้อมูลจาก Gateway...</div>
        </div>
    </div>

    <script>
        function goPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-card').forEach(c => c.classList.remove('active'));
            document.getElementById('page-'+page).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // CRUD Logic
        const DB = {
            get: (k) => JSON.parse(localStorage.getItem(k)) || [],
            set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
            add: (k, item) => { const d = DB.get(k); d.push({id: Date.now(), ...item}); DB.set(k, d); },
            del: (k, id) => DB.set(k, DB.get(k).filter(x => x.id !== id))
        };

        function renderTasks() {
            document.getElementById('task-list').innerHTML = DB.get('tasks').map(t => 
                `<div class="item-row"><div>${t.title}</div><div class="delete-btn" onclick="DB.del('tasks', ${t.id}); renderTasks()">🗑️</div></div>`
            ).join('') || 'ไม่มีงาน';
        }
        function addTask() {
            const val = document.getElementById('task-title').value;
            if(val) { DB.add('tasks', {title: val}); document.getElementById('task-title').value = ''; renderTasks(); }
        }

        function renderNotes() {
            document.getElementById('note-list').innerHTML = DB.get('notes').map(n => 
                `<div class="item-row" style="flex-direction:column;gap:5px;">
                    <div style="display:flex;justify-content:space-between"><b>${n.title}</b> <span class="delete-btn" onclick="DB.del('notes', ${n.id}); renderNotes()">🗑️</span></div>
                    <div style="color:var(--text2);font-size:0.9em">${n.body}</div>
                </div>`
            ).join('') || 'ไม่มีโน้ต';
        }
        function addNote() {
            const t = document.getElementById('note-title').value;
            const b = document.getElementById('note-body').value;
            if(t) { DB.add('notes', {title: t, body: b}); document.getElementById('note-title').value = ''; document.getElementById('note-body').value = ''; renderNotes(); }
        }

        // Fetchers
        async function fetchWeather() {
            try {
                const res = await fetch('https://wttr.in/Bangkok?format=j1');
                const data = await res.json();
                const current = data.current_condition[0];
                document.getElementById('weather-card').innerHTML = `<h3>🇹🇭 กรุงเทพ: ${current.temp_C}°C</h3><p>${current.weatherDesc[0].value}</p><p style="font-size:0.8em;color:var(--text2)">Feels like: ${current.FeelsLikeC}°C | Humidity: ${current.humidity}%</p>`;
            } catch(e) { document.getElementById('weather-card').innerHTML = '❌ โหลดสภาพอากาศไม่สำเร็จ'; }
        }

        async function fetchNews() {
            // Mocking news fetch as Brave Search needs API key / backend proxy
            document.getElementById('news-card').innerHTML = `
                <div style="margin-bottom:10px">🔴 <b>ตลาดคริปโตวันนี้</b> - Bitcoin ทะลุ $80,000 รับกระแสการลงทุน</div>
                <div style="margin-bottom:10px">🔵 <b>Tech Update</b> - AI รุ่นใหม่ประมวลผลเร็วขึ้น 2 เท่า</div>
                <div>🟢 <b>เศรษฐกิจ</b> - ราคาทองคำผันผวนเล็กน้อย</div>
            `;
        }

        async function fetchSystemStatus() {
            document.getElementById('sys-status').innerHTML = `
                <div class="item-row"><span>🌐 Gateway API</span> <span style="color:var(--success)">Online</span></div>
                <div class="item-row"><span>🤖 OpenClaw Core</span> <span style="color:var(--success)">v2026.3.2</span></div>
                <div class="item-row"><span>☁️ Sync Service</span> <span style="color:var(--warning)">Pending</span></div>
            `;
        }

        // Init
        renderTasks(); renderNotes();
        fetchWeather(); fetchNews(); fetchSystemStatus();
    </script>
</body>
</html>
