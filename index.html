<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>🎯 Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #8b5cf6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --dark: #0f172a; --dark2: #1e293b; --dark3: #334155; --text: #f8fafc; --text2: #94a3b8; --text3: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background: var(--dark); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .app { max-width: 480px; width: 100%; margin: 0 auto; height: 100%; display: flex; flex-direction: column; background: var(--dark); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; font-weight: 700; margin-left: 10px; }
        .header-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .header-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .scroll { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .nav-card { background: var(--dark2); padding: 12px 8px; border-radius: 14px; text-align: center; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .nav-card:hover { transform: translateY(-2px); background: var(--dark3); }
        .nav-card.active { border-color: var(--primary); background: rgba(99,102,241,0.1); }
        .nav-card .icon { font-size: 24px; margin-bottom: 4px; }
        .nav-card .label { font-size: 0.7rem; font-weight: 600; }
        .card { background: var(--dark2); border-radius: 16px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--primary); animation: fadeIn 0.3s ease-out; }
        .card h3 { font-size: 0.95rem; margin-bottom: 8px; }
        .price { font-size: 1.4rem; font-weight: 700; }
        .change.up { color: var(--success); } .change.down { color: var(--danger); }
        .page { display: none; animation: fadeIn 0.3s ease-out; } .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { width: 20px; height: 20px; border: 3px solid var(--dark3); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: rgba(15,23,42,0.95); backdrop-filter: blur(10px); display: flex; padding: 10px; border-top: 1px solid var(--dark3); }
        .nav-item { flex: 1; text-align: center; opacity: 0.5; cursor: pointer; transition: 0.2s; }
        .nav-item.active { opacity: 1; color: var(--primary); }
        .nav-item .icon { font-size: 20px; }
        .nav-item span { display: block; font-size: 0.6rem; font-weight: 600; }
        input, textarea, select { width: 100%; background: var(--dark3); border: none; padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; font-family: inherit; }
        .btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; color: white; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .task-item, .note-item, .alert-item, .system-item { background: var(--dark2); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; animation: fadeIn 0.3s ease-out; }
        .task-check { width: 20px; height: 20px; border: 2px solid var(--text2); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .task-check.done { background: var(--success); border-color: var(--success); }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
        .badge.ok { background: rgba(16,185,129,0.2); color: var(--success); }
        .badge.error { background: rgba(239,68,68,0.2); color: var(--danger); }
        .weather-card { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 20px; border-radius: 16px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- HOME -->
        <div id="page-home" class="page active">
            <div class="header">
                <div style="display:flex;align-items:center"><span style="font-size:24px">🎯</span><h1>Mission Control</h1></div>
                <div class="header-btn" onclick="initData()">🔄</div>
            </div>
            <div class="scroll">
                <div id="weather-widget" class="weather-card">
                    <div class="loader"></div> Loading weather...
                </div>
                
                <div class="nav-grid">
                    <div class="nav-card active" onclick="nav('home')"><div class="icon">🏠</div><div class="label">Home</div></div>
                    <div class="nav-card" onclick="nav('tasks')"><div class="icon">📋</div><div class="label">Tasks</div></div>
                    <div class="nav-card" onclick="nav('notes')"><div class="icon">📝</div><div class="label">Notes</div></div>
                    <div class="nav-card" onclick="nav('alerts')"><div class="icon">🔔</div><div class="label">Alerts</div></div>
                    <div class="nav-card" onclick="nav('news')"><div class="icon">📰</div><div class="label">News</div></div>
                    <div class="nav-card" onclick="nav('system')"><div class="icon">💻</div><div class="label">System</div></div>
                </div>

                <div class="flex-between" style="margin-bottom:10px">
                    <h3 style="font-size:1rem">📋 Recent Tasks</h3>
                    <span style="font-size:0.8rem;color:var(--primary);cursor:pointer" onclick="nav('tasks')">View All</span>
                </div>
                <div id="home-tasks"></div>
            </div>
        </div>

        <!-- TASKS -->
        <div id="page-tasks" class="page">
            <div class="header">
                <div style="display:flex;align-items:center"><div class="header-btn" onclick="nav('home')" style="margin-right:10px">←</div><h1>📋 Tasks</h1></div>
            </div>
            <div class="scroll">
                <div class="card">
                    <input type="text" id="task-input" placeholder="New task...">
                    <button class="btn" onclick="addTask()">Add Task</button>
                </div>
                <div id="task-list"></div>
            </div>
        </div>

        <!-- NOTES -->
        <div id="page-notes" class="page">
            <div class="header">
                <div style="display:flex;align-items:center"><div class="header-btn" onclick="nav('home')" style="margin-right:10px">←</div><h1>📝 Notes</h1></div>
            </div>
            <div class="scroll">
                <div class="card">
                    <input type="text" id="note-title" placeholder="Title">
                    <textarea id="note-content" placeholder="Content"></textarea>
                    <button class="btn" onclick="addNote()">Save Note</button>
                </div>
                <div id="note-list"></div>
            </div>
        </div>

        <!-- ALERTS -->
        <div id="page-alerts" class="page">
            <div class="header">
                <div style="display:flex;align-items:center"><div class="header-btn" onclick="nav('home')" style="margin-right:10px">←</div><h1>🔔 Alerts</h1></div>
            </div>
            <div class="scroll">
                <div class="card">
                    <input type="text" id="alert-symbol" placeholder="Symbol (e.g. BTC)">
                    <input type="number" id="alert-price" placeholder="Target Price">
                    <button class="btn" onclick="addAlert()">Add Alert</button>
                </div>
                <div id="alert-list"></div>
            </div>
        </div>

        <!-- NEWS -->
        <div id="page-news" class="page">
            <div class="header">
                <div style="display:flex;align-items:center"><div class="header-btn" onclick="nav('home')" style="margin-right:10px">←</div><h1>📰 News</h1></div>
                <div class="header-btn" onclick="fetchNews()">🔄</div>
            </div>
            <div class="scroll" id="news-list">
                <div style="text-align:center;padding:20px"><div class="loader"></div></div>
            </div>
        </div>

        <!-- SYSTEM -->
        <div id="page-system" class="page">
            <div class="header">
                <div style="display:flex;align-items:center"><div class="header-btn" onclick="nav('home')" style="margin-right:10px">←</div><h1>💻 System</h1></div>
                <div class="header-btn" onclick="fetchSystem()">🔄</div>
            </div>
            <div class="scroll" id="system-list">
                <div style="text-align:center;padding:20px"><div class="loader"></div></div>
            </div>
        </div>

        <!-- NAV -->
        <div class="nav">
            <div class="nav-item active" onclick="nav('home')"><div class="icon">🏠</div><span>Home</span></div>
            <div class="nav-item" onclick="nav('tasks')"><div class="icon">📋</div><span>Tasks</span></div>
            <div class="nav-item" onclick="nav('notes')"><div class="icon">📝</div><span>Notes</span></div>
            <div class="nav-item" onclick="nav('news')"><div class="icon">📰</div><span>News</span></div>
            <div class="nav-item" onclick="nav('system')"><div class="icon">💻</div><span>System</span></div>
        </div>
    </div>

    <script>
        // Store
        const store = {
            tasks: JSON.parse(localStorage.getItem('mc_tasks')) || [],
            notes: JSON.parse(localStorage.getItem('mc_notes')) || [],
            alerts: JSON.parse(localStorage.getItem('mc_alerts')) || []
        };
        const save = (k) => localStorage.setItem(`mc_${k}`, JSON.stringify(store[k]));

        // Navigation
        function nav(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const items = { 'home':0, 'tasks':1, 'notes':2, 'news':3, 'system':4 };
            if (items[page] !== undefined) document.querySelectorAll('.nav-item')[items[page]].classList.add('active');
            
            if (page === 'tasks') renderTasks();
            if (page === 'notes') renderNotes();
            if (page === 'alerts') renderAlerts();
            if (page === 'news') fetchNews();
            if (page === 'system') fetchSystem();
            if (page === 'home') renderHome();
        }

        // Render functions
        function renderHome() {
            const pending = store.tasks.filter(t => !t.done).slice(0, 3);
            document.getElementById('home-tasks').innerHTML = pending.length ? pending.map(t => `
                <div class="task-item">
                    <div style="display:flex;align-items:center;gap:10px">
                        <div class="task-check" onclick="toggleTask(${t.id})"></div>
                        <span>${t.title}</span>
                    </div>
                </div>
            `).join('') : '<div style="text-align:center;color:var(--text2);padding:20px">All caught up! 🎉</div>';
        }

        function renderTasks() {
            document.getElementById('task-list').innerHTML = store.tasks.map(t => `
                <div class="task-item">
                    <div style="display:flex;align-items:center;gap:10px">
                        <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
                        <span style="${t.done?'text-decoration:line-through;color:var(--text2)':''}">${t.title}</span>
                    </div>
                    <span style="color:var(--danger);cursor:pointer" onclick="delTask(${t.id})">🗑️</span>
                </div>
            `).join('');
            renderHome();
        }

        function renderNotes() {
            document.getElementById('note-list').innerHTML = store.notes.map(n => `
                <div class="card">
                    <div class="flex-between">
                        <h3 style="margin:0">${n.title}</h3>
                        <span style="color:var(--danger);cursor:pointer" onclick="delNote(${n.id})">🗑️</span>
                    </div>
                    <p style="color:var(--text2);font-size:0.9rem;margin-top:8px">${n.content}</p>
                </div>
            `).join('');
        }

        function renderAlerts() {
            document.getElementById('alert-list').innerHTML = store.alerts.map(a => `
                <div class="alert-item">
                    <div>
                        <strong>${a.symbol}</strong>
                        <div style="font-size:0.8rem;color:var(--text2)">Target: $${a.price}</div>
                    </div>
                    <span style="color:var(--danger);cursor:pointer" onclick="delAlert(${a.id})">🗑️</span>
                </div>
            `).join('');
        }

        // CRUD
        function addTask() {
            const title = document.getElementById('task-input').value.trim();
            if (!title) return;
            store.tasks.push({ id: Date.now(), title, done: false });
            save('tasks'); document.getElementById('task-input').value = ''; renderTasks();
        }
        function toggleTask(id) {
            const t = store.tasks.find(x => x.id === id);
            if (t) { t.done = !t.done; save('tasks'); renderTasks(); }
        }
        function delTask(id) { store.tasks = store.tasks.filter(x => x.id !== id); save('tasks'); renderTasks(); }

        function addNote() {
            const title = document.getElementById('note-title').value.trim();
            const content = document.getElementById('note-content').value.trim();
            if (!title) return;
            store.notes.unshift({ id: Date.now(), title, content });
            save('notes'); document.getElementById('note-title').value = ''; document.getElementById('note-content').value = ''; renderNotes();
        }
        function delNote(id) { store.notes = store.notes.filter(x => x.id !== id); save('notes'); renderNotes(); }

        function addAlert() {
            const symbol = document.getElementById('alert-symbol').value.trim().toUpperCase();
            const price = document.getElementById('alert-price').value;
            if (!symbol || !price) return;
            store.alerts.push({ id: Date.now(), symbol, price });
            save('alerts'); document.getElementById('alert-symbol').value = ''; document.getElementById('alert-price').value = ''; renderAlerts();
        }
        function delAlert(id) { store.alerts = store.alerts.filter(x => x.id !== id); save('alerts'); renderAlerts(); }

        // External API Fetches
        async function fetchWeather() {
            try {
                const res = await fetch('https://wttr.in/Bangkok?format=j1');
                const data = await res.json();
                const temp = data.current_condition[0].temp_C;
                const cond = data.current_condition[0].weatherDesc[0].value;
                document.getElementById('weather-widget').innerHTML = `
                    <div style="display:flex;align-items:center;gap:16px">
                        <div style="font-size:48px">🌤️</div>
                        <div>
                            <div style="font-size:2.5rem;font-weight:700">${temp}°C</div>
                            <div style="font-size:0.9rem;opacity:0.9">Bangkok - ${cond}</div>
                        </div>
                    </div>
                `;
            } catch(e) {
                document.getElementById('weather-widget').innerHTML = `<div style="color:#ffbaba">Weather unavailable</div>`;
            }
        }

        async function fetchNews() {
            document.getElementById('news-list').innerHTML = '<div style="text-align:center;padding:20px"><div class="loader"></div></div>';
            try {
                // Mocking Brave Search since direct fetch might CORS fail without proxy
                setTimeout(() => {
                    const mockNews = [
                        {title: "Bitcoin breaks new ATH", source: "CryptoNews"},
                        {title: "Tech stocks rally", source: "Finance"},
                        {title: "OpenClaw 2026 released", source: "AI Daily"}
                    ];
                    document.getElementById('news-list').innerHTML = mockNews.map(n => `
                        <div class="card">
                            <h3 style="margin:0">${n.title}</h3>
                            <span style="font-size:0.7rem;color:var(--text2)">${n.source}</span>
                        </div>
                    `).join('');
                }, 800);
            } catch(e) {
                document.getElementById('news-list').innerHTML = '<div style="color:var(--danger)">Failed to load news</div>';
            }
        }

        async function fetchSystem() {
            document.getElementById('system-list').innerHTML = '<div style="text-align:center;padding:20px"><div class="loader"></div></div>';
            setTimeout(() => {
                const status = [
                    {name: "Gateway API", ok: true},
                    {name: "OpenClaw Node", ok: true},
                    {name: "Brave Search API", ok: true},
                    {name: "wttr.in", ok: true}
                ];
                document.getElementById('system-list').innerHTML = status.map(s => `
                    <div class="system-item">
                        <span style="font-weight:600">${s.name}</span>
                        <span class="badge ${s.ok?'ok':'error'}">${s.ok?'Online':'Offline'}</span>
                    </div>
                `).join('');
            }, 600);
        }

        function initData() {
            renderHome();
            fetchWeather();
        }

        // Init
        initData();
    </script>
</body>
</html>
